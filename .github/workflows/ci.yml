name: CI

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }} with Cangjie ${{ matrix.cangjie_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cangjie_version: 1.0.0
          - os: ubuntu-latest
            cangjie_version: 1.0.5
          - os: windows-latest
            cangjie_version: 1.0.5
          - os: macos-latest
            cangjie_version: 1.0.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Winlibs (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://github.com/brechtsanders/winlibs_mingw/releases/download/14.2.0posix-19.1.7-12.0.0-msvcrt-r3/winlibs-x86_64-posix-seh-gcc-14.2.0-llvm-19.1.7-mingw-w64msvcrt-12.0.0-r3.7z" -OutFile "winlibs.7z"
          7z x "winlibs.7z" -o"C:\winlibs-ci" -y
          echo "C:\winlibs-ci\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Winlibs installation (Windows)
        if: runner.os == 'Windows'
        run: |
          clang --version

      - name: Setup Ninja (Windows)
        if: runner.os == 'Windows'
        uses: turtlesec-no/get-ninja@main

      - name: Set macOS Deployment Target (macOS)
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV

      - name: Setup Cangjie
        uses: Zxilly/setup-cangjie@d932a790bbb53ff47ead0609829d91a1e831a440
        with:
          channel: lts
          version: ${{ matrix.cangjie_version }}
          archive-path: ./cangjie-archive

      - name: Build
        run: cjpm build

      - name: Test
        run: cjpm test
